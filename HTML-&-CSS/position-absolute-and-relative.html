<!DOCTYPE html>
<html>
    <head>
        <title>Position absolute and relative practice</title>

        <style>
            body {
                height: 3000px;
            }
        </style>
    </head>

    <body>
        <div style="
                position: absolute;
                right: 8px;
                bottom: 8px;
            ">
            <div style="
                background-color: gray;
                width: 320px;
                height: 180px;
                position: relative;
            ">
                <div style="
                    background-color: black;
                    color: white;
                    position: absolute;
                    font-family: Arial, Helvetica, sans-serif;
                    padding: 3px 7px;
                    border-radius: 50px;
                    left: -8px;
                    top: -8px;
                ">X</div>

                <div style="
                    background-color: black;
                    color: white;
                    position: absolute;
                    font-family: Arial, Helvetica, sans-serif;
                    padding: 3px 7px;
                    border-radius: 50px;
                    right: 8px;
                    bottom: 8px;
                ">0:29</div>
            </div>
        </div>

        <div style="
            width: fit-content;
            position: relative;
        ">
            <img src="images/shirt.png" alt="" style="
                width: 200px;
            ">

            <div style="
                font-family: Arial, Helvetica, sans-serif;
                font-size: small;
                position: absolute;
                background-color: black;
                color: white;
                padding: 5px;
                right: 0px;
                top: 10px;
            ">20% OFF</div>

            <div style="
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: rgba(255, 255, 255, 0.8);
                width: 200px;
                height: 80px;
                position: absolute;
                right: 0;
                left: 0;
                bottom: 0;
            ">
                <button style="
                    background-color: white;
                    border: 1px solid black;
                    padding: 5px 10px;
                ">Add to cart</button>
            </div>
        </div>
    </body>
</html>

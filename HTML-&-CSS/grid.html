<!DOCTYPE html>
<html>
    <head>
        <title>Grid practice</title>

        <style>
            :root {
                --profile-image-size: 150px;
            }

            p, button {
                margin: 0;
            }

            .profiles-grid {
                display: grid;
                grid-template-columns: var(--profile-image-size) var(--profile-image-size) var(--profile-image-size);
                column-gap: 20px;
            }

            .profile-container {
                display: grid;
                grid-template-columns: var(--profile-image-size);
                font-family: Arial, Helvetica, sans-serif;
                box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
            }

            .cat-image {
                width: var(--profile-image-size);
                height: var(--profile-image-size);
                object-fit: cover;
                margin-bottom: 10px;
            }

            .profile-name {
                font-weight: bold;
                margin-left: 5px;
            }

            .mutual-info-container {
                display: grid;
                grid-template-columns: 20px 1fr;
                align-items: center;
                margin-left: 5px;
                margin-bottom: 8px;
            }

            .mutual-image {
                width: 20px;
                height: 20px;
                object-fit: cover;
                border-radius: 30px;
            }

            .mutual-text {
                font-size: small; 
                color: gray;
                margin-left: 5px;
            }

            .friend-button {
                background-color: rgb(53, 100, 254);
                color: white;
                border: none;
                padding: 5px 15px;
                border-radius: 5px;
                font-size: small;
                width: fit-content;
                margin-left: 5px;
                margin-bottom: 8px;
            }
        </style>
    </head>

    <body>
        <div style="
            display: grid;
            grid-template-columns: 200px 75px;
            margin-bottom: 20px;
            ">
            <div style="background-color: lightblue;">200px</div>
            <div style="background-color: lightpink;">75px</div>
        </div>

        <div style="
            display: grid;
            margin-bottom: 20px;
            grid-template-columns: 50px 1fr 75px;
            ">
            <div style="background-color: lightblue;">50px</div>
            <div style="background-color: lightpink;">1fr</div>
            <div style="background-color: lightblue;">75px</div>
        </div>

        <div style="
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 100px 100px 100px 100px; 
            row-gap: 10px;
            column-gap: 20px;
            ">
            <div style="background-color: lightpink;">col1</div>
            <div style="background-color: lightpink;">col2</div>
            <div style="background-color: lightpink;">col3</div>
            <div style="background-color: lightpink;">col4</div>
            <div style="background-color: lightpink;">col1</div>
            <div style="background-color: lightpink;">col2</div>
            <div style="background-color: lightpink;">col3</div>
            <div style="background-color: lightpink;">col4</div>        
        </div>

        <div class="profiles-grid">  
            <div class="profile-container">
                <img src="images/cat.jpg" class="cat-image">
                <p class="profile-name">Oliver</p>
                <div class="mutual-info-container">
                    <img src="images/dog.jpg" class="mutual-image">
                    <p class="mutual-text">2 mutual friends</p>
                </div>
                <button class="friend-button">Add Friend</button> 
            </div>
            <div  class="profile-container">
                <img src="images/cat-2.jpg" class="cat-image">
                <p class="profile-name">Mimi</p>
                <div class="mutual-info-container">
                    <img src="images/dog.jpg" class="mutual-image">
                    <p class="mutual-text">3 mutual friends</p>
                </div>
                <button class="friend-button">Add Friend</button>          
            </div>
            <div  class="profile-container">
                <img src="images/cat-3.jpg" class="cat-image">
                <p class="profile-name">Rex</p>
                <div class="mutual-info-container">
                    <img src="images/dog.jpg" class="mutual-image">
                    <p class="mutual-text">4 mutual friends</p>
                </div>
                <button class="friend-button">Add Friend</button>
            </div>
        </div>
    </body>
</html>

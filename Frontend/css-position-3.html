<!DOCTYPE html>
<html>
    <head>
        <title>CSS position practice</title>

        <style>
            body {
                background-color: black;
            }

            .discord-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                display: flex;
                font-family: Arial, Helvetica, sans-serif;
            }

            .discord-sidebar .chats-conatainer {
                display: flex;
                flex-direction: column;
                background-color: rgb(48, 48, 48);
                padding: 15px 10px;
                gap: 5px;
            }

            .discord-sidebar .chats-conatainer img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 30px;
            }

            .discord-sidebar .chat-info-container {
                display: flex;
                flex-direction: column;
                background-color: rgb(61, 61, 61);
                padding: 15px 15px;
                justify-content: start;
                width: 150px;
                gap: 10px;
            }

            .discord-sidebar .chat-info-container .info-text {
                color: white;
                font-size: 12px;
                font-weight: bold;
                flex: 1;
            }

            .discord-sidebar .chat-info-container .plus-text {
                color: rgb(155, 155, 155);
                font-size: 25px;
            }

            .discord-sidebar .chat-info-container .channels-text {
                font-size: 15px;
                color: rgb(155, 155, 155);
            }
        </style>
    </head>

    <body>
        <nav class="discord-sidebar">
            <div class="chats-conatainer">
                <img src="images/cat.jpg" alt="err">
                <img src="images/dog.jpg" alt="err">
                <img src="images/cat-3.jpg" alt="err">
            </div>

            <div class="chat-info-container">
                <div style="display: flex; align-items: center;">
                    <div class="info-text">INFO</div>
                    <div class="plus-text">&#43;</div>
                </div>
                <div class="channels-text"># new-videos</div>
                <div class="channels-text"># updates</div>
                <div class="channels-text"># faq</div>
            </div>
        </nav>
    </body>
</html>

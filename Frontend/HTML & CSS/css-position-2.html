<!DOCTYPE html>
<html>
    <head>
        <title>CSS position practice</title>

        <style>
            body {
                background-color: black;
            }

            .facebook-header {
                font-family: Arial, Helvetica, sans-serif;
                display: flex;
                position: fixed;
                right: 0;
                left: 0;
                top: 0;
                background-color: white;
                align-items: center;
                padding: 5px 50px 5px 60px;
            }

            .facebook-header .profile-image {
                width: 40px;
                height: 40px;
                object-fit: cover;
                border-radius: 20px;
            }

            .facebook-header .profile-name {
                flex: 1;
                margin-left: 10px;
                font-weight: bold;
            }

            .facebook-header .add-friend-button {
                font-weight: bold;
                background-color: rgb(91, 156, 255);
                color: white;
                border: none;
                padding: 8px 10px;
                border-radius: 5px;
                margin-right: 8px;
            }

            .facebook-header .message-button {
                font-weight: bold;
                background-color: lightgray;
                color: black;
                border: none;
                padding: 8px 10px;
                border-radius: 5px;
            }
        </style>
    </head>

    <body>
        <header class="facebook-header">
            <img src="images/cat.jpg" alt="err" class="profile-image">
            <div class="profile-name">Oliver Cat</div>
            <button class="add-friend-button">Add Friend</button>
            <button class="message-button">Message</button>
        </header>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="icon" type="image/png" href="../../images/icon.png">
    

    <style>
        .loading-bar {
            position: relative;
            display: block;
            width: 600px;
            height: 50px;
            border-radius: 100px;
            overflow: hidden;
        }

        .fill {
            width: 0%;
            height: 100%;
            background-color: blue;
        }

        .status {
            inset: 0;
            position: absolute;
            font-family: Arial, Helvetica, sans-serif;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <button class="js-button">Click</button>
    <p class="js-message-container"></p>

    <div class="loading-bar js-loading-bar">
        <div class="fill js-fill"></div>
        <div class="status js-status">0%</div>
    </div>
    <button class="loading-bar-button js-loading-bar-button" style="margin-top: 5px;">Click to progress the bar</button>

    <script type="module" src="main.js" defer></script>
</body>
</html>
